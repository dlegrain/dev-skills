<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background rounded square -->
  <rect width="32" height="32" rx="7" fill="#6366f1"/>
  <!-- Stylized brain / circuit node design -->
  <!-- Central node -->
  <circle cx="16" cy="16" r="3" fill="white"/>
  <!-- Connecting lines -->
  <line x1="16" y1="13" x2="16" y2="7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="16" y1="19" x2="16" y2="25" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="13" y1="16" x2="7" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="19" y1="16" x2="25" y2="16" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Diagonal lines -->
  <line x1="13.9" y1="13.9" x2="9" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18.1" y1="18.1" x2="23" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="18.1" y1="13.9" x2="23" y2="9" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="13.9" y1="18.1" x2="9" y2="23" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Outer nodes -->
  <circle cx="16" cy="7" r="2" fill="white"/>
  <circle cx="16" cy="25" r="2" fill="white"/>
  <circle cx="7" cy="16" r="2" fill="white"/>
  <circle cx="25" cy="16" r="2" fill="white"/>
  <circle cx="9" cy="9" r="1.5" fill="#a5b4fc"/>
  <circle cx="23" cy="23" r="1.5" fill="#a5b4fc"/>
  <circle cx="23" cy="9" r="1.5" fill="#a5b4fc"/>
  <circle cx="9" cy="23" r="1.5" fill="#a5b4fc"/>
</svg>
